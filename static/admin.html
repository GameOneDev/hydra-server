<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hydra Server Admin</title>
<style>
  :root {
    --bg: #14141a; --panel: #1c1c24; --panel-2: #23232e;
    --text: #e6e6ec; --muted: #8f8f9f; --accent: #7c6bff;
    --danger: #ff5c6c; --ok: #4cd07d; --border: #2e2e3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 16px 64px; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  header h1 { font-size: 18px; margin: 0; }
  header .spacer { flex: 1; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  .card .sub { color: var(--muted); font-size: 12px; margin-top: 2px; }
  table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  th { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; background: var(--panel-2); }
  tr:last-child td { border-bottom: none; }
  tr.clickable { cursor: pointer; }
  tr.clickable:hover td { background-color: var(--panel-2); }
  td.banner-cell { background-size: cover; background-position: center; }
  table.kv th { width: 200px; background: var(--panel); text-transform: none; font-size: 13px; letter-spacing: 0; }
  table.kv td { word-break: break-all; }
  .avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--panel-2); object-fit: cover; vertical-align: middle; margin-right: 8px; }
  .avatar.big { width: 56px; height: 56px; margin-right: 0; flex: none; }
  .game { display: flex; align-items: center; gap: 10px; min-width: 180px; }
  .game .cover { width: 72px; height: 27px; object-fit: cover; border-radius: 4px; background: var(--panel-2); flex: none; }
  .game .game-name { font-weight: 600; }
  .game .game-sub { font-size: 12px; }
  button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 7px; padding: 6px 12px; cursor: pointer; font: inherit; font-size: 13px;
  }
  button:hover { border-color: var(--accent); }
  button.danger { color: var(--danger); }
  button.danger:hover { border-color: var(--danger); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pill { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
  .pill.ok { background: rgba(76, 208, 125, .12); color: var(--ok); }
  .pill.bad { background: rgba(255, 92, 108, .12); color: var(--danger); }
  .muted { color: var(--muted); }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .settings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-bottom: 14px; }
  .settings-grid label { display: block; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
  .settings-grid input {
    width: 100%; margin-top: 6px; padding: 9px 11px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font: inherit;
  }
  .settings-actions { display: flex; align-items: center; gap: 10px; }
  .settings-actions .status { font-size: 13px; }
  .settings-actions .status.ok { color: var(--ok); }
  .settings-actions .status.bad { color: var(--danger); }
  .settings-note { margin-top: 10px; font-size: 12px; }
  .user-head { display: flex; align-items: center; gap: 16px; margin: 12px 0 4px; background-size: cover; background-position: center; }
  .user-head .user-meta { display: flex; flex-direction: column; gap: 2px; }
  .user-head .spacer { flex: 1; }
  #login { max-width: 340px; margin: 18vh auto 0; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
  #login h1 { margin: 0 0 16px; font-size: 18px; }
  #login input {
    width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font: inherit; margin-bottom: 12px;
  }
  #login button { width: 100%; padding: 10px; }
  .error { color: var(--danger); font-size: 13px; min-height: 18px; margin-bottom: 8px; }
  .section-title { margin: 28px 0 10px; font-size: 15px; }
  .heatmap { display: flex; flex-direction: column; gap: 10px; overflow-x: auto; }
  .heatmap-chart { display: flex; gap: 4px; }
  .heatmap-weekdays { display: flex; flex-direction: column; gap: 3px; padding-top: 15px; }
  .heatmap-weekday { flex: 1; display: flex; align-items: center; min-width: 30px; color: var(--muted); font-size: 10px; }
  .heatmap-weeks { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .heatmap-months { display: flex; gap: 3px; height: 12px; }
  .heatmap-month { flex: 1; min-width: 6px; overflow: visible; white-space: nowrap; color: var(--muted); font-size: 10px; line-height: 12px; }
  .heatmap-grid { display: flex; gap: 3px; }
  .heatmap-week { flex: 1; min-width: 6px; display: flex; flex-direction: column; gap: 3px; }
  .heatmap-cell { width: 100%; aspect-ratio: 1; border-radius: 2px; }
  .heatmap-cell.l0 { background: rgba(255, 255, 255, 0.05); }
  .heatmap-cell.l1 { background: #2e2a5e; }
  .heatmap-cell.l2 { background: #443c92; }
  .heatmap-cell.l3 { background: #5d51c8; }
  .heatmap-cell.l4 { background: var(--accent); }
  .heatmap-cell.future { background: transparent; }
  .heatmap-cell:not(.future):hover { outline: 1px solid rgba(255, 255, 255, 0.45); outline-offset: -1px; }
  .heatmap-legend { display: flex; align-items: center; justify-content: flex-end; gap: 3px; color: var(--muted); font-size: 10px; }
  .heatmap-legend .heatmap-cell { flex: none; width: 10px; height: 10px; }
  .heatmap-legend span:first-child { margin-right: 4px; }
  .heatmap-legend span:last-child { margin-left: 4px; }
  #detail { display: none; }
  .back { color: var(--accent); cursor: pointer; background: none; border: none; padding: 0; font-size: 14px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="login" class="hidden">
  <h1>Hydra Server Admin</h1>
  <div class="error" id="login-error"></div>
  <input id="password" type="password" placeholder="Admin password" autofocus />
  <button class="primary" id="login-btn">Sign in</button>
</div>

<div class="wrap hidden" id="app">
  <header>
    <h1>Hydra Server Admin</h1>
    <span class="muted" id="public-url"></span>
    <div class="spacer"></div>
    <button id="logout-btn">Log out</button>
  </header>

  <div id="dashboard">
    <div class="cards" id="cards"></div>

    <h2 class="section-title">Playtime</h2>
    <div class="panel">
      <div class="muted" id="playtime-summary" style="font-size: 12px; margin-bottom: 10px;"></div>
      <div class="heatmap" id="playtime-heatmap"></div>
    </div>

    <h2 class="section-title">Server</h2>
    <table class="kv"><tbody id="server-info"></tbody></table>

    <h2 class="section-title">Settings</h2>
    <div class="panel">
      <div class="settings-grid">
        <label>Per-user quota (GiB, 0 = unlimited)
          <input id="set-quota" type="number" min="0" step="0.1" />
        </label>
        <label>Backups per game
          <input id="set-backups" type="number" min="1" step="1" />
        </label>
        <label>Allowed users (comma separated, empty = everyone)
          <input id="set-allowed" type="text" placeholder="ids or usernames" />
        </label>
      </div>
      <div class="settings-actions">
        <button class="primary" id="save-settings">Save</button>
        <button id="reset-settings">Reset to env defaults</button>
        <span class="status" id="settings-status"></span>
      </div>
      <div class="muted settings-note" id="settings-defaults"></div>
    </div>

    <h2 class="section-title">Users</h2>
    <table>
      <thead><tr>
        <th>User</th><th>Backups</th><th>Emu saves</th><th>Achievements</th>
        <th>Storage used</th><th>Last seen</th><th>Status</th><th></th>
      </tr></thead>
      <tbody id="users"></tbody>
    </table>
  </div>

  <div id="detail">
    <button class="back" id="back-btn">&larr; Back to users</button>
    <div class="user-head panel" id="user-head"></div>
    <h3 class="section-title">Playtime</h3>
    <div class="panel">
      <div class="heatmap" id="user-playtime"></div>
    </div>
    <h3 class="section-title">Cloud save backups</h3>
    <table>
      <thead><tr>
        <th>Game</th><th>Label</th><th>Size</th><th>Host</th><th>Shared</th><th>Frozen</th><th>Created</th><th></th>
      </tr></thead>
      <tbody id="artifacts"></tbody>
    </table>
    <h3 class="section-title">Achievements</h3>
    <table>
      <thead><tr>
        <th>Game</th><th>Unlocked</th><th>Last synced</th>
      </tr></thead>
      <tbody id="achievements"></tbody>
    </table>
    <h3 class="section-title">Emulation saves</h3>
    <table>
      <thead><tr>
        <th>Platform</th><th>Emulator</th><th>File</th><th>Size</th><th>Updated</th><th></th>
      </tr></thead>
      <tbody id="saves"></tbody>
    </table>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const GIB = 2 ** 30;
let currentUser = null;
let quotaBytes = 0;

const fmtBytes = (n) => {
  if (!n) return "0 B";
  const units = ["B", "KB", "MB", "GB", "TB"];
  const i = Math.min(units.length - 1, Math.floor(Math.log2(n) / 10));
  return (n / 2 ** (10 * i)).toFixed(i ? 1 : 0) + " " + units[i];
};
const fmtDate = (iso) => iso ? new Date(iso).toLocaleString() : "—";
const fmtDuration = (seconds) => {
  const d = Math.floor(seconds / 86400), h = Math.floor(seconds % 86400 / 3600),
        m = Math.floor(seconds % 3600 / 60);
  if (d) return `${d}d ${h}h`;
  if (h) return `${h}h ${m}m`;
  return `${m}m`;
};
const fmtQuota = (bytes) => bytes ? fmtBytes(bytes) : "unlimited";
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
/* Safe inside CSS url("…"): percent-encode everything url() could choke on. */
const cssUrl = (u) => encodeURI(String(u)).replace(/["'()]/g, (c) => encodeURIComponent(c));
const bannerBg = (url, angle) =>
  `background-image: linear-gradient(${angle}, rgba(20,20,26,.94), rgba(20,20,26,.72)), url("${cssUrl(url)}")`;

async function api(path, options = {}) {
  const res = await fetch(path, {
    headers: { "Content-Type": "application/json" },
    ...options,
  });
  if (res.status === 401) { showLogin(); throw new Error("unauthorized"); }
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.message || res.statusText);
  }
  return res.json();
}

function showLogin() {
  $("login").classList.remove("hidden");
  $("app").classList.add("hidden");
}

async function showApp() {
  $("login").classList.add("hidden");
  $("app").classList.remove("hidden");
  await loadOverview();
  await Promise.all([loadUsers(), loadSettings(), loadPlaytime()]);
}

const HEATMAP_WEEKS = 52, HEATMAP_LEVELS = 4;
const heatmapDayKey = (d) =>
  `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;

/* GitHub-style calendar heatmap; the launcher profile renders the same
   chart from the same daily buckets. Tooltips are native title attributes. */
function renderHeatmap(root, entries, aggregate) {
  root.innerHTML = "";
  const byDay = new Map(entries.map((e) => [e.day, e]));
  const max = Math.max(0, ...entries.map((e) => e.totalSeconds));
  const level = (s) => (s <= 0 || max <= 0)
    ? 0 : Math.min(HEATMAP_LEVELS, Math.max(1, Math.ceil((s / max) * HEATMAP_LEVELS)));

  const today = new Date(); today.setHours(0, 0, 0, 0);
  const start = new Date(today);
  start.setDate(start.getDate() - (HEATMAP_WEEKS * 7 - 1));
  start.setDate(start.getDate() - start.getDay());

  const weeks = [];
  const cursor = new Date(start);
  while (cursor <= today) {
    const week = [];
    for (let i = 0; i < 7; i++) { week.push(new Date(cursor)); cursor.setDate(cursor.getDate() + 1); }
    weeks.push(week);
  }

  const monthFmt = new Intl.DateTimeFormat(undefined, { month: "short" });
  const weekdayFmt = new Intl.DateTimeFormat(undefined, { weekday: "short" });
  const dateFmt = new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric" });
  const el = (cls, parent) => {
    const node = document.createElement("div");
    node.className = cls;
    parent.appendChild(node);
    return node;
  };

  const chart = el("heatmap-chart", root);

  const weekdays = el("heatmap-weekdays", chart);
  weeks[0].forEach((d, row) => {
    const label = el("heatmap-weekday", weekdays);
    if (row % 2 === 1) label.textContent = weekdayFmt.format(d);
  });

  const weeksEl = el("heatmap-weeks", chart);
  const months = el("heatmap-months", weeksEl);
  weeks.forEach((week, i) => {
    const label = el("heatmap-month", months);
    const m = week[0].getMonth();
    if (i === 0 || weeks[i - 1][0].getMonth() !== m) label.textContent = monthFmt.format(week[0]);
  });

  const grid = el("heatmap-grid", weeksEl);
  weeks.forEach((week) => {
    const col = el("heatmap-week", grid);
    week.forEach((d) => {
      if (d > today) { el("heatmap-cell future", col); return; }
      const entry = byDay.get(heatmapDayKey(d));
      const cell = el(`heatmap-cell l${level(entry?.totalSeconds ?? 0)}`, col);
      const date = dateFmt.format(d);
      if (!entry || entry.totalSeconds <= 0) {
        cell.title = `No playtime on ${date}`;
        return;
      }
      const top = entry.games?.[0];
      const topName = top ? (top.name || `${top.shop}/${top.objectId}`) : null;
      cell.title = `${fmtDuration(entry.totalSeconds)} on ${date}`
        + (topName ? ` · ${topName}` : "")
        + (aggregate && entry.playerCount
          ? ` · ${entry.playerCount} player${entry.playerCount === 1 ? "" : "s"}` : "");
    });
  });

  const legend = el("heatmap-legend", root);
  legend.appendChild(document.createElement("span")).textContent = "Less";
  for (let l = 0; l <= HEATMAP_LEVELS; l++) el(`heatmap-cell l${l}`, legend);
  legend.appendChild(document.createElement("span")).textContent = "More";
}

async function loadPlaytime() {
  const entries = await api("/admin/api/playtime?days=364").catch(() => []);
  const total = entries.reduce((acc, e) => acc + e.totalSeconds, 0);
  $("playtime-summary").textContent = total
    ? `${fmtDuration(total)} played across all users in the last year`
    : "No playtime reported yet — launchers report it while a game is running.";
  renderHeatmap($("playtime-heatmap"), entries, true);
}

async function loadOverview() {
  const data = await api("/admin/api/overview");
  quotaBytes = data.maxBytesPerUser || 0;
  $("public-url").textContent = data.publicUrl;

  $("cards").innerHTML = [
    ["Users", data.userCount, data.blockedUserCount ? `${data.blockedUserCount} blocked` : ""],
    ["Save backups", data.artifactCount, data.sharedArtifactCount ? `${data.sharedArtifactCount} shared` : ""],
    ["Emulation saves", data.emulationSaveCount, ""],
    ["Achievement games", data.achievementGameCount, "synced game entries"],
    ["Total storage", fmtBytes(data.totalBytes), `db ${fmtBytes(data.databaseBytes)}`],
    ["Per-user quota", fmtQuota(data.maxBytesPerUser), `${data.backupsPerGameLimit} backups/game`],
  ].map(([label, value, sub]) =>
    `<div class="card"><div class="label">${label}</div><div class="value">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ""}</div>`
  ).join("");

  $("server-info").innerHTML = [
    ["Version", `hydra-server v${data.version}`],
    ["Uptime", fmtDuration(data.uptimeSeconds)],
    ["Public URL", data.publicUrl],
    ["Official Hydra API", data.officialApiUrl],
    ["Database size", fmtBytes(data.databaseBytes)],
    ["Allowed users", data.allowedUsers.length ? data.allowedUsers.join(", ") : "everyone with a valid official login"],
  ].map(([key, value]) => `<tr><th>${key}</th><td>${esc(String(value))}</td></tr>`).join("");
}

async function loadSettings() {
  const s = await api("/admin/api/settings");
  $("set-quota").value = s.maxBytesPerUser ? +(s.maxBytesPerUser / GIB).toFixed(2) : 0;
  $("set-backups").value = s.backupsPerGameLimit;
  $("set-allowed").value = s.allowedUsers.join(", ");
  $("settings-defaults").textContent =
    `Env defaults: quota ${fmtQuota(s.defaults.maxBytesPerUser)} · `
    + `${s.defaults.backupsPerGameLimit} backups/game · `
    + `allowed users: ${s.defaults.allowedUsers.length ? s.defaults.allowedUsers.join(", ") : "everyone"}. `
    + (s.overridden ? "Panel overrides are active." : "No overrides saved — env values apply.");
}

function settingsStatus(text, bad = false) {
  const el = $("settings-status");
  el.textContent = text;
  el.className = `status ${bad ? "bad" : "ok"}`;
  setTimeout(() => { if (el.textContent === text) el.textContent = ""; }, 4000);
}

$("save-settings").addEventListener("click", async () => {
  const payload = { allowedUsers: $("set-allowed").value.split(",").map((s) => s.trim()).filter(Boolean) };
  const quota = $("set-quota").value.trim();
  if (quota !== "") payload.maxBytesPerUser = Math.max(0, Math.round(Number(quota) * GIB));
  const backups = $("set-backups").value.trim();
  if (backups !== "") payload.backupsPerGameLimit = Number(backups);

  try {
    await api("/admin/api/settings", { method: "PUT", body: JSON.stringify(payload) });
    settingsStatus("Saved — applied immediately.");
    await loadOverview();
    await Promise.all([loadUsers(), loadSettings()]);
  } catch (err) {
    settingsStatus(err.message, true);
  }
});

$("reset-settings").addEventListener("click", async () => {
  if (!confirm("Clear all panel overrides and go back to the environment settings?")) return;
  try {
    await api("/admin/api/settings", { method: "DELETE" });
    settingsStatus("Overrides cleared.");
    await loadOverview();
    await Promise.all([loadUsers(), loadSettings()]);
  } catch (err) {
    settingsStatus(err.message, true);
  }
});

async function loadUsers() {
  const users = await api("/admin/api/users");
  $("users").innerHTML = users.map((u) => `
    <tr class="clickable" data-id="${esc(u.id)}" data-name="${esc(u.displayName)}">
      <td${u.bannerUrl ? ` class="banner-cell" style='${bannerBg(u.bannerUrl, "90deg")}'` : ""}>
        ${u.profileImageUrl ? `<img class="avatar" src="${esc(u.profileImageUrl)}" alt="" />` : ""}
        <strong>${esc(u.displayName)}</strong>
        <span class="muted">${u.username ? "@" + esc(u.username) : ""}</span>
      </td>
      <td>${u.artifactCount}</td>
      <td>${u.emulationSaveCount}</td>
      <td>${u.achievementGameCount}</td>
      <td>${fmtBytes(u.totalBytes)}${quotaBytes ? ` <span class="muted">(${Math.round(u.totalBytes / quotaBytes * 100)}%)</span>` : ""}</td>
      <td class="muted">${fmtDate(u.lastSeenAt)}</td>
      <td>${u.isBlocked ? '<span class="pill bad">blocked</span>' : '<span class="pill ok">active</span>'}</td>
      <td style="white-space:nowrap">
        <button data-action="block" data-blocked="${u.isBlocked}">${u.isBlocked ? "Unblock" : "Block"}</button>
        <button class="danger" data-action="delete">Delete data</button>
      </td>
    </tr>
  `).join("") || '<tr><td colspan="8" class="muted">No users yet — they appear after the first launcher request.</td></tr>';
}

$("users").addEventListener("click", async (event) => {
  const row = event.target.closest("tr[data-id]");
  if (!row) return;
  const id = row.dataset.id;
  const action = event.target.dataset.action;

  if (action === "block") {
    event.stopPropagation();
    await api(`/admin/api/users/${id}/block`, {
      method: "POST",
      body: JSON.stringify({ blocked: event.target.dataset.blocked !== "true" }),
    });
    return loadUsers();
  }
  if (action === "delete") {
    event.stopPropagation();
    if (!confirm(`Delete ALL server data (backups, saves, achievements) for ${row.dataset.name}?`)) return;
    await api(`/admin/api/users/${id}`, { method: "DELETE" });
    return Promise.all([loadOverview(), loadUsers()]);
  }
  openUser(id);
});

/* Game cell: cover art + name, with the raw shop/object id underneath.
   Unresolved names get patched in by resolveGames(). */
function gameCell(shop, objectId, name, coverUrl) {
  const key = `${shop}:${objectId}`;
  return `<div class="game" data-game="${esc(key)}">
    <img class="cover${coverUrl ? "" : " hidden"}"${coverUrl ? ` src="${esc(coverUrl)}"` : ""} alt="" loading="lazy" onerror="this.classList.add('hidden')" />
    <div>
      <div class="game-name">${esc(name || objectId)}</div>
      <div class="muted game-sub">${esc(shop)}/${esc(objectId)}</div>
    </div>
  </div>`;
}

/* Ask the server to resolve games we don't have a name for yet (it caches
   the result), then patch the rendered cells in place. */
function resolveGames(entries) {
  const pending = new Map();
  for (const entry of entries) {
    if (!entry.shop || !entry.objectId || entry.gameName) continue;
    pending.set(`${entry.shop}:${entry.objectId}`, entry);
  }

  for (const [key, entry] of pending) {
    api(`/admin/api/games/${encodeURIComponent(entry.shop)}/${encodeURIComponent(entry.objectId)}`)
      .then((meta) => {
        if (!meta.name && !meta.coverUrl) return;
        document.querySelectorAll(".game").forEach((el) => {
          if (el.dataset.game !== key) return;
          if (meta.name) el.querySelector(".game-name").textContent = meta.name;
          const img = el.querySelector("img.cover");
          if (meta.coverUrl && img && !img.getAttribute("src")) {
            img.src = meta.coverUrl;
            img.classList.remove("hidden");
          }
        });
      })
      .catch(() => {});
  }
}

async function openUser(id) {
  currentUser = id;
  const data = await api(`/admin/api/users/${id}`);
  $("dashboard").style.display = "none";
  $("detail").style.display = "block";

  const u = data.user;
  $("user-head").style.backgroundImage = u.bannerUrl
    ? `linear-gradient(105deg, rgba(20,20,26,.93), rgba(20,20,26,.6)), url("${cssUrl(u.bannerUrl)}")`
    : "";
  $("user-head").innerHTML = `
    ${u.profileImageUrl ? `<img class="avatar big" src="${esc(u.profileImageUrl)}" alt="" />` : '<div class="avatar big"></div>'}
    <div class="user-meta">
      <div>
        <strong>${esc(u.displayName)}</strong>
        ${u.username ? `<span class="muted">@${esc(u.username)}</span>` : ""}
        ${u.isBlocked ? '<span class="pill bad">blocked</span>' : '<span class="pill ok">active</span>'}
      </div>
      <div class="muted mono">${esc(u.id)}</div>
      <div class="muted">First seen ${fmtDate(u.createdAt)} · last seen ${fmtDate(u.lastSeenAt)}</div>
      <div class="muted">${u.artifactCount} backups · ${u.emulationSaveCount} emu saves · ${u.achievementGameCount} games with achievements · ${fmtBytes(u.totalBytes)} used${quotaBytes ? ` of ${fmtBytes(quotaBytes)}` : ""}</div>
    </div>
    <div class="spacer"></div>
    <button id="detail-block" data-blocked="${u.isBlocked}">${u.isBlocked ? "Unblock" : "Block"}</button>
  `;

  $("artifacts").innerHTML = data.artifacts.map((a) => `
    <tr>
      <td>${gameCell(a.shop, a.objectId, a.gameName, a.gameCoverUrl)}</td>
      <td>${esc(a.label || "—")}</td>
      <td>${fmtBytes(a.sizeBytes)}${a.isUploaded ? "" : ' <span class="pill bad">pending</span>'}</td>
      <td class="muted">${esc(a.hostname)}</td>
      <td>${a.shareCount ? `${a.shareCount}&times;` : ""}</td>
      <td>${a.isFrozen ? "🧊" : ""}</td>
      <td class="muted">${fmtDate(a.createdAt)}</td>
      <td style="white-space:nowrap">
        <button data-download="${esc(a.id)}">Download</button>
        <button class="danger" data-del-artifact="${esc(a.id)}">Delete</button>
      </td>
    </tr>
  `).join("") || '<tr><td colspan="8" class="muted">No backups.</td></tr>';

  $("achievements").innerHTML = data.achievements.map((a) => `
    <tr>
      <td>${a.shop && a.objectId
        ? gameCell(a.shop, a.objectId, a.gameName, a.gameCoverUrl)
        : `<span class="muted">game #${esc(a.remoteGameId)}</span>`}</td>
      <td>${a.achievementCount}</td>
      <td class="muted">${fmtDate(a.updatedAt)}</td>
    </tr>
  `).join("") || '<tr><td colspan="3" class="muted">No achievements synced.</td></tr>';

  $("saves").innerHTML = data.emulationSaves.map((s) => `
    <tr>
      <td>${esc(s.platform)}</td>
      <td>${esc(s.emulator)}</td>
      <td>${esc(s.fileName || s.label || "—")}</td>
      <td>${fmtBytes(s.sizeBytes)}</td>
      <td class="muted">${fmtDate(s.updatedAt)}</td>
      <td><button class="danger" data-del-save="${esc(s.id)}">Delete</button></td>
    </tr>
  `).join("") || '<tr><td colspan="6" class="muted">No emulation saves.</td></tr>';

  api(`/admin/api/playtime?days=364&userId=${encodeURIComponent(id)}`)
    .then((entries) => renderHeatmap($("user-playtime"), entries, false))
    .catch(() => { $("user-playtime").innerHTML = ""; });

  resolveGames([...data.artifacts, ...data.achievements]);
}

$("user-head").addEventListener("click", async (event) => {
  if (event.target.id !== "detail-block") return;
  await api(`/admin/api/users/${currentUser}/block`, {
    method: "POST",
    body: JSON.stringify({ blocked: event.target.dataset.blocked !== "true" }),
  });
  openUser(currentUser);
});

$("detail").addEventListener("click", async (event) => {
  const download = event.target.dataset.download;
  const delArtifact = event.target.dataset.delArtifact;
  const delSave = event.target.dataset.delSave;

  if (download) window.open(`/admin/api/artifacts/${download}/download`, "_blank");
  if (delArtifact && confirm("Delete this backup?")) {
    await api(`/admin/api/artifacts/${delArtifact}`, { method: "DELETE" });
    openUser(currentUser);
    loadOverview();
  }
  if (delSave && confirm("Delete this emulation save?")) {
    await api(`/admin/api/emulation-saves/${delSave}`, { method: "DELETE" });
    openUser(currentUser);
    loadOverview();
  }
});

$("back-btn").addEventListener("click", () => {
  $("detail").style.display = "none";
  $("dashboard").style.display = "block";
  loadUsers();
});

$("login-btn").addEventListener("click", doLogin);
$("password").addEventListener("keydown", (event) => {
  if (event.key === "Enter") doLogin();
});

async function doLogin() {
  $("login-error").textContent = "";
  try {
    await api("/admin/api/login", {
      method: "POST",
      body: JSON.stringify({ password: $("password").value }),
    });
    await showApp();
  } catch (err) {
    $("login-error").textContent = err.message;
  }
}

$("logout-btn").addEventListener("click", async () => {
  await api("/admin/api/logout", { method: "POST" }).catch(() => {});
  showLogin();
});

/* Try an authenticated call; fall back to the login screen. */
api("/admin/api/overview").then(showApp).catch(showLogin);
</script>
</body>
</html>
